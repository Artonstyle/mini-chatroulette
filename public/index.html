<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Mini Chatroulette</h1>
  </header>

  <main id="container">
    <section>
      <div class="card">
        <div class="video-row">
          <video id="localVideo" autoplay muted playsinline></video>
          <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <div class="controls">
          <button class="btn primary btn-start" disabled>Start</button>
          <button class="btn primary btn-next" disabled>⏭ Nächster</button>
          <button class="btn danger btn-stop" disabled>⏹ Stop</button>
        </div>
      </div>
    </section>

    <aside>
      <div class="card">
        <label>
          Ich bin:
          <select id="gender">
            <option>Mann</option>
            <option>Frau</option>
          </select>
        </label>

        <label>
          Ich suche:
          <select id="search">
            <option>Mann</option>
            <option>Frau</option>
          </select>
        </label>

        <label>
          Mein Land:
          <select id="country">
            <option>Deutschland</option>
            <option>Österreich</option>
            <option>Schweiz</option>
          </select>
        </label>

        <div id="profileInfo">
          👥 Online: <span id="onlineCount">0</span>
        </div>
      </div>

      <div class="card" id="chat">
        <div class="messages chat-messages"></div>

        <div class="input-row chat-input">
          <input id="msgInput" type="text" placeholder="Nachricht schreiben..." disabled>
          <button class="btn primary btn-send" disabled>💬 Senden</button>
        </div>
      </div>
    </aside>
  </main>

  <script src="client.js"></script>
