  <script src="client.js?v=20260401-34"></script>

  <script>
    (function () {
      const body = document.body;
      const chatToggle = document.getElementById("chatToggle");
      const menuToggle = document.getElementById("menuToggle");
      const chatBadge = document.getElementById("chatBadge");
      const overlay = document.getElementById("mobileOverlay");

      let unread = 0;

      function isMobile() {
        return window.innerWidth <= 800;
      }

      function closePanels() {
        body.classList.remove("chat-open");
        body.classList.remove("filter-open");
      }

      function updateBadge() {
        if (unread > 0) {
          chatBadge.textContent = unread > 99 ? "99+" : unread;
          chatBadge.classList.add("show");
        } else {
          chatBadge.classList.remove("show");
        }
      }

      function playSound() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.frequency.value = 880;
          gain.gain.value = 0.05;

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        } catch {}
      }

      function vibrate() {
        if (navigator.vibrate) {
          navigator.vibrate([120, 60, 120]);
        }
      }

      if (chatToggle) {
        chatToggle.addEventListener("click", () => {
          if (!isMobile()) return;

          const open = !body.classList.contains("chat-open");
          closePanels();

          if (open) {
            body.classList.add("chat-open");
            unread = 0;
            updateBadge();
          }
        });
      }

      if (menuToggle) {
        menuToggle.addEventListener("click", () => {
          if (isMobile()) return;

          body.classList.toggle("filter-open");
        });
      }

      if (overlay) {
        overlay.addEventListener("click", closePanels);
      }

      window.addEventListener("partner-message-received", () => {
        if (!isMobile()) return;
        if (body.classList.contains("chat-open")) return;

        unread += 1;
        updateBadge();
        playSound();
        vibrate();
      });

      window.addEventListener("resize", () => {
        if (!isMobile()) closePanels();
      });
    })();
  </script>
