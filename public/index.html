<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mini Chatroulette – Videochat online</title>
  <meta name="description" content="Treffe neue Leute per Videochat – kostenlos Mini Chatroulette online.">
  <meta name="robots" content="index, follow">
  <meta name="google-site-verification" content="R18AgRj5XCuOv_p3Lr0YY-XwHXl67vZXX75hyb7442k" />

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Mobile Topbar -->
  <div class="mobile-topbar">
    <div class="mobile-logo">Mini Chatroulette</div>

    <div class="mobile-top-actions">
      <button id="chatToggle" class="mobile-icon-btn" type="button" aria-label="Chat öffnen">
        💬
        <span id="chatBadge" class="mobile-badge">0</span>
      </button>

      <button id="filterToggle" class="mobile-icon-btn" type="button" aria-label="Filter öffnen">
        ⚙️
      </button>
    </div>
  </div>

  <div id="mobileOverlay" class="mobile-overlay"></div>

  <header>Mini Chatroulette</header>

  <!-- Profilbereich -->
  <section class="profile-form">
    <div class="form-left">
      <label>Ich bin:
        <select id="gender">
          <option>Mann</option>
          <option>Frau</option>
        </select>
      </label>

      <label>Ich suche:
        <select id="search">
          <option>Mann</option>
          <option>Frau</option>
        </select>
      </label>

      <label>Mein Land:
        <select id="country">
          <option>Deutschland</option>
          <option>Österreich</option>
          <option>Schweiz</option>
        </select>
      </label>

      <button class="btn-start" disabled>Start</button>
    </div>

    <div class="online-right">
      👥 Online: <span id="onlineCount">0</span>
    </div>
  </section>

  <!-- Videos -->
  <section class="videos">
    <div class="video-container">
      <video id="localVideo" autoplay muted playsinline></video>

      <div class="remote-wrap">
        <video id="remoteVideo" autoplay playsinline></video>

        <div id="remoteStatus" class="remote-status show">
          <div class="remote-status-inner">
            <div class="spinner"></div>
            <div class="remote-status-title">Noch nicht gestartet</div>
            <div class="remote-status-sub">Tippe auf Start</div>
          </div>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn-next" disabled>⏭ Nächster</button>
      <button class="btn-stop" disabled>⏹ Stop</button>
    </div>
  </section>

  <!-- Chat -->
  <section class="chat-box" id="chatBox">
    <div class="chat-messages"></div>

    <div class="chat-input">
      <input id="msgInput" type="text" placeholder="Nachricht schreiben..." disabled>
      <button class="btn-send" disabled>💬 Senden</button>
    </div>
  </section>

  <script src="client.js"></script>

  <script>
    (function () {
      const body = document.body;
      const chatToggle = document.getElementById("chatToggle");
      const filterToggle = document.getElementById("filterToggle");
      const chatBadge = document.getElementById("chatBadge");
      const overlay = document.getElementById("mobileOverlay");
      const chatMessages = document.querySelector(".chat-messages");

      let unread = 0;

      function isMobile() {
        return window.innerWidth <= 800;
      }

      function closePanels() {
        body.classList.remove("chat-open");
        body.classList.remove("filter-open");
      }

      function updateBadge() {
        if (unread > 0) {
          chatBadge.textContent = unread > 99 ? "99+" : unread;
          chatBadge.classList.add("show");
        } else {
          chatBadge.classList.remove("show");
        }
      }

      function playSound() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.frequency.value = 880;
          gain.gain.value = 0.05;

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        } catch {}
      }

      function vibrate() {
        if (navigator.vibrate) {
          navigator.vibrate([120, 60, 120]);
        }
      }

      chatToggle.addEventListener("click", () => {
        if (!isMobile()) return;

        const open = !body.classList.contains("chat-open");
        closePanels();

        if (open) {
          body.classList.add("chat-open");
          unread = 0;
          updateBadge();
        }
      });

      filterToggle.addEventListener("click", () => {
        if (!isMobile()) return;

        const open = !body.classList.contains("filter-open");
        closePanels();

        if (open) {
          body.classList.add("filter-open");
        }
      });

      overlay.addEventListener("click", closePanels);

      if (chatMessages) {
        const observer = new MutationObserver((mutations) => {
          if (!isMobile()) return;
          if (body.classList.contains("chat-open")) return;

          let added = 0;

          for (const m of mutations) {
            m.addedNodes.forEach((node) => {
              if (node.nodeType !== 1) return;

              const text = (node.textContent || "").trim();

              if (text.startsWith("Partner:")) {
                added++;
              }
            });
          }

          if (added > 0) {
            unread += added;
            updateBadge();
            playSound();
            vibrate();
          }
        });

        observer.observe(chatMessages, { childList: true });
      }

      window.addEventListener("resize", () => {
        if (!isMobile()) closePanels();
      });
    })();
  </script>
</body>
</html>
