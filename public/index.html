      body.menu-open .form-left label {

<body>

  <header>Mini Chatroulette</header>

  <div class="mobile-topbar">
    <div class="mobile-topbar-title">Mini Chatroulette</div>
    <div class="mobile-topbar-right">
      <div class="mobile-online">👥 <span id="onlineCountMirror">0</span></div>
      <button class="mobile-menu-btn" id="mobileMenuBtn" type="button">☰</button>
    </div>
  </div>

  <div class="mobile-menu-backdrop" id="mobileMenuBackdrop"></div>
  <div class="mobile-chat-backdrop" id="mobileChatBackdrop"></div>

  <!-- Profilbereich -->
  <section class="profile-form">
    <div class="form-left">
      <label>Ich bin:
        <select id="gender"><option>Mann</option><option>Frau</option></select>
      </label>
      <label>Ich suche:
        <select id="search"><option>Mann</option><option>Frau</option></select>
      </label>
      <label>Mein Land:
        <select id="country"><option>Deutschland</option><option>Österreich</option><option>Schweiz</option></select>
      </label>
      <button class="btn-start">Start</button>
    </div>
    <div class="online-right">
      👥 Online: <span id="onlineCount">0</span>
    </div>
  </section>

  <!-- Videos + Buttons -->
  <section class="videos">
    <div class="video-container">
      <video id="localVideo" autoplay muted playsinline></video>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="local-video-label">Du</div>
    <div class="buttons">
      <button class="btn-next">⏭ Nächster</button>
      <button class="btn-stop">⏹ Stop</button>
    </div>
  </section>

  <!-- Chat -->
  <section class="chat-box">
    <div class="chat-messages"></div>
    <div class="chat-input">
      <input type="text" placeholder="Nachricht schreiben..." />
      <button class="btn-send">💬 Senden</button>
    </div>
  </section>

  <button class="mobile-chat-fab" id="mobileChatFab" type="button">
    💬
    <span class="mobile-chat-badge" id="mobileChatBadge">0</span>
  </button>

  <script>
    const bodyEl = document.body;
    const mobileMenuBtn = document.getElementById("mobileMenuBtn");
    const mobileMenuBackdrop = document.getElementById("mobileMenuBackdrop");
    const mobileChatBackdrop = document.getElementById("mobileChatBackdrop");
    const mobileChatFab = document.getElementById("mobileChatFab");
    const mobileChatBadge = document.getElementById("mobileChatBadge");
    const onlineCount = document.getElementById("onlineCount");
    const onlineCountMirror = document.getElementById("onlineCountMirror");
    const localVideo = document.getElementById("localVideo");

    let unreadCount = 0;
    let dragging = false;
    let startX = 0;
    let startY = 0;
    let initialLeft = 0;
    let initialTop = 0;

    function isMobile() {
      return window.innerWidth <= 768;
    }

    function syncOnlineCount() {
      if (onlineCount && onlineCountMirror) {
        onlineCountMirror.textContent = onlineCount.textContent;
      }
    }

    const countObserver = new MutationObserver(syncOnlineCount);
    countObserver.observe(onlineCount, { childList: true, subtree: true, characterData: true });
    syncOnlineCount();

    function closePanels() {
      bodyEl.classList.remove("menu-open");
      bodyEl.classList.remove("chat-open");
    }

    mobileMenuBtn.addEventListener("click", () => {
      if (!isMobile()) return;
      const willOpen = !bodyEl.classList.contains("menu-open");
      closePanels();
      if (willOpen) bodyEl.classList.add("menu-open");
    });

    mobileMenuBackdrop.addEventListener("click", () => {
      bodyEl.classList.remove("menu-open");
    });

    mobileChatFab.addEventListener("click", () => {
      if (!isMobile()) return;
      const willOpen = !bodyEl.classList.contains("chat-open");
      bodyEl.classList.remove("menu-open");
      bodyEl.classList.toggle("chat-open", willOpen);
      if (willOpen) {
        unreadCount = 0;
        updateBadge();
      }
    });

    mobileChatBackdrop.addEventListener("click", () => {
      bodyEl.classList.remove("chat-open");
    });

    function updateBadge() {
      if (unreadCount > 0) {
        mobileChatBadge.textContent = unreadCount > 99 ? "99+" : unreadCount;
        mobileChatBadge.classList.add("show");
      } else {
        mobileChatBadge.classList.remove("show");
      }
    }

    localVideo.addEventListener("pointerdown", (e) => {
      if (!isMobile()) return;
      dragging = true;

      const rect = localVideo.getBoundingClientRect();
      initialLeft = rect.left;
      initialTop = rect.top;
      startX = e.clientX;
      startY = e.clientY;
      e.preventDefault();
    });

    window.addEventListener("pointermove", (e) => {
      if (!dragging || !isMobile()) return;

      let newLeft = initialLeft + (e.clientX - startX);
      let newTop = initialTop + (e.clientY - startY);

      const maxLeft = window.innerWidth - localVideo.offsetWidth - 8;
      const maxTop = window.innerHeight - localVideo.offsetHeight - 90;

      if (newLeft < 8) newLeft = 8;
      if (newTop < 66) newTop = 66;
      if (newLeft > maxLeft) newLeft = maxLeft;
      if (newTop > maxTop) newTop = maxTop;

      localVideo.style.left = newLeft + "px";
      localVideo.style.top = newTop + "px";
      localVideo.style.right = "auto";
    });

    window.addEventListener("pointerup", () => {
      dragging = false;
    });

    window.addEventListener("pointercancel", () => {
      dragging = false;
    });

    /* optional helper for future incoming-message badge */
    window.mobileChatNotify = function () {
      if (isMobile() && !bodyEl.classList.contains("chat-open")) {
        unreadCount++;
        updateBadge();
      }
    };
  </script>

  <!-- Client-Script -->
  <script src="client.js"></script>
</body>
