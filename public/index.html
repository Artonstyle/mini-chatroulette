    video {

      border-radius: 8px;

    /* Mobile extra Elemente standardmäßig aus */

      .mobile-menu-backdrop {

      }

      .mobile-menu {
        display: block;
        position: fixed;
        top: 10px;

        background: #202c33;

<body>

  <!-- Mobile Menü -->
  <div class="mobile-menu-backdrop" id="mobileMenuBackdrop"></div>
  <div class="mobile-menu" id="mobileMenu">

    <div class="mobile-menu-content">
      <label>Ich bin:
        <select id="mobileGender">
          <option>Mann</option>

      </label>
      <label>Ich suche:
        <select id="mobileSearch">

    </div>
  </div>

  <!-- Videos + Buttons -->
  <section class="videos">
    <div class="video-container" id="videoContainer">

      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="buttons">
      <button class="btn-next" id="nextBtn">⏭ Nächster</button>
      <button class="btn-stop" id="stopBtn">⏹ Stop</button>
    </div>
  </section>

  <!-- Mobile Floating eigenes Video -->
  <div class="mobile-local-video" id="mobileLocalVideo">
    <div class="me-label">Du</div>
  </div>

  <!-- Chat Desktop -->
  <section class="chat-box" id="desktopChatBox">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">

      <button class="btn-send" id="sendBtn">💬 Senden</button>
    </div>
  </section>

  <!-- Mobile Chat Button -->
  <button class="mobile-chat-fab" id="mobileChatFab">
    💬
    <span class="mobile-chat-badge" id="mobileChatBadge">0</span>
  </button>

  <!-- Mobile Chat Overlay -->
  <div class="mobile-chat-overlay" id="mobileChatOverlay">
    <div class="mobile-chat-header">
      <div class="mobile-chat-title">Chat</div>
      <button class="mobile-chat-close" id="mobileChatClose">Schließen</button>
    </div>
    <div class="mobile-chat-messages" id="mobileChatMessages"></div>
    <div class="mobile-chat-input">
      <input type="text" id="mobileChatInput" placeholder="Nachricht schreiben..." />
      <button id="mobileSendBtn">Senden</button>
    </div>
  </div>

  <script>
    const onlineCount = document.getElementById('onlineCount');
    const onlineCountMobile = document.getElementById('onlineCountMobile');

    const gender = document.getElementById('gender');
    const search = document.getElementById('search');
    const country = document.getElementById('country');

    const mobileGender = document.getElementById('mobileGender');
    const mobileSearch = document.getElementById('mobileSearch');
    const mobileCountry = document.getElementById('mobileCountry');

    const desktopStartBtn = document.getElementById('desktopStartBtn');
    const mobileStartBtn = document.getElementById('mobileStartBtn');

    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileMenuBackdrop = document.getElementById('mobileMenuBackdrop');
    const mobileMenuClose = document.getElementById('mobileMenuClose');

    const localVideo = document.getElementById('localVideo');
    const videoContainer = document.getElementById('videoContainer');
    const mobileLocalVideo = document.getElementById('mobileLocalVideo');

    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    const mobileChatFab = document.getElementById('mobileChatFab');
    const mobileChatBadge = document.getElementById('mobileChatBadge');
    const mobileChatOverlay = document.getElementById('mobileChatOverlay');
    const mobileChatClose = document.getElementById('mobileChatClose');
    const mobileChatMessages = document.getElementById('mobileChatMessages');
    const mobileChatInput = document.getElementById('mobileChatInput');
    const mobileSendBtn = document.getElementById('mobileSendBtn');

    let unreadCount = 0;
    let chatOpen = false;

    function isMobile() {
      return window.innerWidth <= 768;
    }

    function syncOnlineCount() {
      if (onlineCount && onlineCountMobile) {
        onlineCountMobile.textContent = onlineCount.textContent;
      }
    }

    if (onlineCount && onlineCountMobile) {
      const observer = new MutationObserver(syncOnlineCount);
      observer.observe(onlineCount, { childList: true, subtree: true, characterData: true });
      syncOnlineCount();
    }

    function syncDesktopToMobileFields() {
      if (mobileGender) mobileGender.value = gender.value;
      if (mobileSearch) mobileSearch.value = search.value;
      if (mobileCountry) mobileCountry.value = country.value;
    }

    function syncMobileToDesktopFields() {
      if (mobileGender) gender.value = mobileGender.value;
      if (mobileSearch) search.value = mobileSearch.value;
      if (mobileCountry) country.value = mobileCountry.value;
    }

    if (gender) gender.addEventListener('change', syncDesktopToMobileFields);
    if (search) search.addEventListener('change', syncDesktopToMobileFields);
    if (country) country.addEventListener('change', syncDesktopToMobileFields);

    if (mobileGender) mobileGender.addEventListener('change', syncMobileToDesktopFields);
    if (mobileSearch) mobileSearch.addEventListener('change', syncMobileToDesktopFields);
    if (mobileCountry) mobileCountry.addEventListener('change', syncMobileToDesktopFields);

    syncDesktopToMobileFields();

    function openMenu() {
      if (!mobileMenu || !mobileMenuBackdrop) return;
      mobileMenu.classList.add('show');
      mobileMenuBackdrop.classList.add('show');
    }

    function closeMenu() {
      if (!mobileMenu || !mobileMenuBackdrop) return;
      mobileMenu.classList.remove('show');
      mobileMenuBackdrop.classList.remove('show');
    }

    if (mobileMenuBtn) mobileMenuBtn.addEventListener('click', openMenu);
    if (mobileMenuClose) mobileMenuClose.addEventListener('click', closeMenu);
    if (mobileMenuBackdrop) mobileMenuBackdrop.addEventListener('click', closeMenu);

    if (mobileStartBtn && desktopStartBtn) {
      mobileStartBtn.addEventListener('click', () => {
        syncMobileToDesktopFields();

        desktopStartBtn.dispatchEvent(
          new MouseEvent('click', {
            bubbles: true,
            cancelable: true,
            view: window
          })
        );

        closeMenu();
      });
    }

    function placeVideos() {
      if (!localVideo || !videoContainer || !mobileLocalVideo) return;

      if (isMobile()) {
        if (!mobileLocalVideo.contains(localVideo)) {
          mobileLocalVideo.appendChild(localVideo);
        }
      } else {
        if (!videoContainer.contains(localVideo)) {
          videoContainer.insertBefore(localVideo, videoContainer.firstChild);
        }
      }
    }

    window.addEventListener('load', placeVideos);
    window.addEventListener('resize', placeVideos);

    (function enableDrag(el) {
      if (!el) return;

      let dragging = false;
      let startX = 0;
      let startY = 0;
      let initialLeft = 0;
      let initialTop = 0;

      el.addEventListener('pointerdown', (e) => {
        if (!isMobile()) return;
        dragging = true;

        const rect = el.getBoundingClientRect();
        initialLeft = rect.left;
        initialTop = rect.top;
        startX = e.clientX;
        startY = e.clientY;
        e.preventDefault();
      });

      window.addEventListener('pointermove', (e) => {
        if (!dragging) return;

        let newLeft = initialLeft + (e.clientX - startX);
        let newTop = initialTop + (e.clientY - startY);

        const maxLeft = window.innerWidth - el.offsetWidth - 8;
        const maxTop = window.innerHeight - el.offsetHeight - 90;

        if (newLeft < 8) newLeft = 8;
        if (newTop < 66) newTop = 66;
        if (newLeft > maxLeft) newLeft = maxLeft;
        if (newTop > maxTop) newTop = maxTop;

        el.style.left = newLeft + 'px';
        el.style.top = newTop + 'px';
        el.style.right = 'auto';
      });

      window.addEventListener('pointerup', () => {
        dragging = false;
      });

      window.addEventListener('pointercancel', () => {
        dragging = false;
      });
    })(mobileLocalVideo);

    function renderMessage(container, text, type) {
      if (!container) return;
      const div = document.createElement('div');
      div.className = 'chat-message ' + type;
      div.textContent = text;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function addMessage(text, type = 'other') {
      renderMessage(chatMessages, text, type);
      renderMessage(mobileChatMessages, text, type);

      if (type === 'other' && isMobile() && !chatOpen) {
        unreadCount++;
        updateBadge();
      }
    }

    function updateBadge() {
      if (!mobileChatBadge) return;
      mobileChatBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
      mobileChatBadge.classList.toggle('show', unreadCount > 0);
    }

    function openMobileChat() {
      if (!mobileChatOverlay) return;
      chatOpen = true;
      mobileChatOverlay.classList.add('show');
      unreadCount = 0;
      updateBadge();
    }

    function closeMobileChat() {
      if (!mobileChatOverlay) return;
      chatOpen = false;
      mobileChatOverlay.classList.remove('show');
    }

    if (mobileChatFab) mobileChatFab.addEventListener('click', openMobileChat);
    if (mobileChatClose) mobileChatClose.addEventListener('click', closeMobileChat);

    function sendMessageFrom(input) {
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'me');
      input.value = '';
    }

    if (sendBtn) sendBtn.addEventListener('click', () => sendMessageFrom(chatInput));
    if (mobileSendBtn) mobileSendBtn.addEventListener('click', () => sendMessageFrom(mobileChatInput));

    if (chatInput) {
      chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessageFrom(chatInput);
      });
    }

    if (mobileChatInput) {
      mobileChatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessageFrom(mobileChatInput);
      });
    }
  </script>

  <!-- Client-Script -->
  <script src="client.js"></script>
</body>
