<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Chatroulette</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Mini Chatroulette</h1>

  <!-- ICONS (nur Mobile sichtbar per CSS) -->
  <div class="top-icons">
    <button id="filterToggle">⚙️</button>
    <button id="chatToggle">
      💬
      <span id="chatBadge">0</span>
    </button>
  </div>
</header>

<main id="container">

  <section>
    <div class="video-row">
      <video id="localVideo" autoplay muted playsinline></video>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="controls">
      <button class="btn primary btn-start">Start</button>
      <button class="btn primary btn-next">⏭</button>
      <button class="btn danger btn-stop">⏹</button>
    </div>
  </section>

  <!-- DEIN ORIGINAL ASIDE BLEIBT -->
  <aside>
    <div class="card">
      <label>Ich bin:
        <select id="gender"><option>Mann</option><option>Frau</option></select>
      </label>

      <label>Ich suche:
        <select id="search"><option>Mann</option><option>Frau</option></select>
      </label>

      <label>Mein Land:
        <select id="country"><option>Deutschland</option><option>Österreich</option><option>Schweiz</option></select>
      </label>

      <div id="profileInfo">
        👥 Online: <span id="onlineCount">0</span>
      </div>
    </div>

    <!-- ORIGINAL CHAT BLEIBT -->
    <div class="card" id="chat">
      <div class="messages chat-messages"></div>
      <div class="input-row chat-input">
        <input id="msgInput" type="text" placeholder="Nachricht...">
        <button class="btn primary btn-send">➡</button>
      </div>
    </div>
  </aside>

</main>

<script src="client.js"></script>

<script>
let unread = 0;

const chatToggle = document.getElementById("chatToggle");
const chatBadge = document.getElementById("chatBadge");
const chat = document.getElementById("chat");

const filterToggle = document.getElementById("filterToggle");
const aside = document.querySelector("aside");

// CHAT
chatToggle.onclick = () => {
  chat.classList.toggle("open");
  unread = 0;
  chatBadge.style.display = "none";
};

// FILTER
filterToggle.onclick = () => {
  aside.classList.toggle("open");
};

// BADGE
const observer = new MutationObserver(() => {
  if (!chat.classList.contains("open")) {
    unread++;
    chatBadge.innerText = unread;
    chatBadge.style.display = "block";
  }
});

observer.observe(document.querySelector(".chat-messages"), {
  childList: true
});
</script>

</body>
</html>
