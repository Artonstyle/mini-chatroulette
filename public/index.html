    const profileForm = document.getElementById('profileForm');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenuClose = document.getElementById('mobileMenuClose');
    const mobileMenuBackdrop = document.getElementById('mobileMenuBackdrop');
    const mobileMenuPanel = document.getElementById('mobileMenuPanel');
    const mobileMenuBody = document.getElementById('mobileMenuBody');

    const videoContainer = document.getElementById('videoContainer');
    const localVideo = document.getElementById('localVideo');
    const mobileLocalWrap = document.getElementById('mobileLocalWrap');

    const chatBox = document.getElementById('chatBox');
    const mobileChatFab = document.getElementById('mobileChatFab');
    const mobileChatOverlay = document.getElementById('mobileChatOverlay');
    const mobileChatBackdrop = document.getElementById('mobileChatBackdrop');
    const mobileChatBadge = document.getElementById('mobileChatBadge');

    const onlineCount = document.getElementById('onlineCount');
    const onlineCountMirror = document.getElementById('onlineCountMirror');

    let chatOpen = false;
    let unreadCount = 0;

    function isMobile() {
      return window.innerWidth <= 768;
    }

    function syncOnlineCount() {
      if (onlineCount && onlineCountMirror) {
        onlineCountMirror.textContent = onlineCount.textContent;
      }
    }

    const countObserver = new MutationObserver(syncOnlineCount);
    countObserver.observe(onlineCount, { childList: true, subtree: true, characterData: true });
    syncOnlineCount();

    function openMenu() {
      mobileMenuPanel.classList.add('show');
      mobileMenuBackdrop.classList.add('show');
    }

    function closeMenu() {
      mobileMenuPanel.classList.remove('show');
      mobileMenuBackdrop.classList.remove('show');
    }

    mobileMenuBtn.addEventListener('click', openMenu);
    mobileMenuClose.addEventListener('click', closeMenu);
    mobileMenuBackdrop.addEventListener('click', closeMenu);

    function updateBadge() {
      if (unreadCount > 0) {
        mobileChatBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
        mobileChatBadge.classList.add('show');
      } else {
        mobileChatBadge.classList.remove('show');
      }
    }

    function openChat() {
      chatOpen = true;
      mobileChatOverlay.classList.add('show');
      mobileChatBackdrop.classList.add('show');
      unreadCount = 0;
      updateBadge();
    }

    function closeChat() {
      chatOpen = false;
      mobileChatOverlay.classList.remove('show');
      mobileChatBackdrop.classList.remove('show');
    }

    mobileChatFab.addEventListener('click', openChat);
    mobileChatBackdrop.addEventListener('click', closeChat);

    function placeElements() {
      if (isMobile()) {
        if (!mobileMenuBody.contains(profileForm)) {
          mobileMenuBody.appendChild(profileForm);
        }

        if (!mobileLocalWrap.contains(localVideo)) {
          mobileLocalWrap.appendChild(localVideo);
        }

        if (!mobileChatOverlay.contains(chatBox)) {
          mobileChatOverlay.appendChild(chatBox);
        }
      } else {
        if (profileForm.parentNode !== document.body) {
          document.body.insertBefore(profileForm, document.querySelector('.videos'));
        }

        if (!videoContainer.contains(localVideo)) {
          videoContainer.insertBefore(localVideo, videoContainer.firstChild);
        }

        if (chatBox.parentNode !== document.body) {
          document.body.insertBefore(chatBox, document.querySelector('script'));
        }

        closeMenu();
        closeChat();
      }
    }

    window.addEventListener('load', placeElements);
    window.addEventListener('resize', placeElements);

    (function enableDrag(el) {
      let dragging = false;
      let startX = 0;
      let startY = 0;
      let initialLeft = 0;
      let initialTop = 0;

      el.addEventListener('pointerdown', (e) => {
        if (!isMobile()) return;

        dragging = true;
        const rect = el.getBoundingClientRect();
        initialLeft = rect.left;
        initialTop = rect.top;
        startX = e.clientX;
        startY = e.clientY;
        e.preventDefault();
      });

      window.addEventListener('pointermove', (e) => {
        if (!dragging) return;

        let newLeft = initialLeft + (e.clientX - startX);
        let newTop = initialTop + (e.clientY - startY);

        const maxLeft = window.innerWidth - el.offsetWidth - 8;
        const maxTop = window.innerHeight - el.offsetHeight - 90;

        if (newLeft < 8) newLeft = 8;
        if (newTop < 66) newTop = 66;
        if (newLeft > maxLeft) newLeft = maxLeft;
        if (newTop > maxTop) newTop = maxTop;

        el.style.left = newLeft + 'px';
        el.style.top = newTop + 'px';
        el.style.right = 'auto';
      });

      window.addEventListener('pointerup', () => dragging = false);
      window.addEventListener('pointercancel', () => dragging = false);
    })(mobileLocalWrap);
  </script>
