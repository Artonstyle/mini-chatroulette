<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Chatroulette - Videochat online</title>
  <meta name="description" content="Treffe neue Leute per Videochat - kostenlos Mini Chatroulette online.">
  <meta name="robots" content="index, follow">
  <meta name="google-site-verification" content="R18AgRj5XCuOv_p3Lr0YY-XwHXl67vZXX75hyb7442k" />
  <link rel="stylesheet" href="style.css?v=20260328-1">
</head>
<body>

  <div class="mobile-topbar">
    <div class="mobile-logo">Mini Chatroulette</div>

    <div class="mobile-top-actions">
      <button id="chatToggle" class="mobile-icon-btn" type="button" aria-label="Chat öffnen">
        <svg class="mobile-chat-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 7.5h12A2.5 2.5 0 0 1 20.5 10v6A2.5 2.5 0 0 1 18 18.5h-6.2l-3.9 3v-3H6A2.5 2.5 0 0 1 3.5 16v-6A2.5 2.5 0 0 1 6 7.5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M8.5 12h7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M8.5 15h4.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span id="chatBadge" class="mobile-badge">0</span>
      </button>
    </div>
  </div>

  <div id="mobileOverlay" class="mobile-overlay"></div>

  <header>Mini Chatroulette</header>

  <section class="profile-form">
    <div class="form-left">
      <label>Ich bin:
        <select id="gender">
          <option value="male">Mann</option>
          <option value="female">Frau</option>
        </select>
      </label>

      <label>Ich suche:
        <select id="search">
          <option value="female">Frauen</option>
          <option value="male">Männer</option>
        </select>
      </label>

      <label>Wähle Land aus:
        <select id="country">
          <option value="all">Alle Länder</option>
          <option value="Deutschland">Deutschland</option>
          <option value="Österreich">Österreich</option>
          <option value="Schweiz">Schweiz</option>
        </select>
      </label>

      <button class="btn-start" disabled>Start</button>
    </div>

    <div class="online-right">
      Online: <span id="onlineCount">0</span>
    </div>
  </section>

  <section class="videos">
    <div class="video-container">
      <div class="local-video-wrap">
        <video id="localVideo" autoplay muted playsinline></video>

        <div class="local-video-controls">
          <button class="video-icon-btn" id="btnMute" disabled aria-label="Mikrofon stummschalten" title="Mikrofon stummschalten"></button>
          <button class="video-icon-btn" id="btnCamera" disabled aria-label="Kamera wechseln" title="Kamera wechseln"></button>
        </div>
      </div>

      <div class="remote-wrap">
        <video id="remoteVideo" autoplay playsinline></video>

        <div id="remoteStatus" class="remote-status show">
          <div class="remote-status-inner">
            <div class="spinner"></div>
            <div class="remote-status-title">Bereit</div>
            <div class="remote-status-sub">Wähle Optionen und drücke Start</div>
          </div>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn-next" disabled>Nächster</button>
      <button class="btn-stop" disabled>Stop</button>
    </div>

    <div class="filter-bar" aria-label="Kameraeffekte">
      <button class="filter-chip active" type="button" data-filter="normal">Natürlich</button>
      <button class="filter-chip" type="button" data-filter="warm">Warm</button>
      <button class="filter-chip" type="button" data-filter="cool">Cool</button>
      <button class="filter-chip" type="button" data-filter="beauty">Beauty</button>
      <button class="filter-chip" type="button" data-filter="mono">Schwarzweiß</button>
    </div>
  </section>

  <section class="chat-box" id="chatBox">
    <div class="chat-messages"></div>

    <div class="chat-input">
      <input id="msgInput" type="text" placeholder="Nachricht schreiben..." disabled>
      <button class="btn-send" disabled>Senden</button>
    </div>
  </section>

  <script src="client.js?v=20260328-1"></script>

  <script>
    (function () {
      const body = document.body;
      const chatToggle = document.getElementById("chatToggle");
      const chatBadge = document.getElementById("chatBadge");
      const overlay = document.getElementById("mobileOverlay");

      let unread = 0;

      function isMobile() {
        return window.innerWidth <= 800;
      }

      function closePanels() {
        body.classList.remove("chat-open");
      }

      function updateBadge() {
        if (unread > 0) {
          chatBadge.textContent = unread > 99 ? "99+" : unread;
          chatBadge.classList.add("show");
        } else {
          chatBadge.classList.remove("show");
        }
      }

      function playSound() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.frequency.value = 880;
          gain.gain.value = 0.05;

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        } catch {}
      }

      function vibrate() {
        if (navigator.vibrate) {
          navigator.vibrate([120, 60, 120]);
        }
      }

      if (chatToggle) {
        chatToggle.addEventListener("click", () => {
          if (!isMobile()) return;

          const open = !body.classList.contains("chat-open");
          closePanels();

          if (open) {
            body.classList.add("chat-open");
            unread = 0;
            updateBadge();
          }
        });
      }

      if (overlay) {
        overlay.addEventListener("click", closePanels);
      }

      window.addEventListener("partner-message-received", () => {
        if (!isMobile()) return;
        if (body.classList.contains("chat-open")) return;

        unread += 1;
        updateBadge();
        playSound();
        vibrate();
      });

      window.addEventListener("resize", () => {
        if (!isMobile()) closePanels();
      });
    })();
  </script>
</body>
</html>
