<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Chatroulette</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 class="logo">Mini Chatroulette</h1>

  <div class="top-icons">
    <button id="filterToggle" class="top-btn" type="button" aria-label="Filter öffnen">⚙️</button>
    <button id="chatToggle" class="top-btn" type="button" aria-label="Chat öffnen">
      💬
      <span id="chatBadge">0</span>
    </button>
  </div>
</header>

<main id="container">

  <section>
    <div class="video-row">
      <video id="localVideo" autoplay muted playsinline></video>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div class="controls">
      <button class="btn primary btn-start" disabled>Start</button>
      <button class="btn primary btn-next" disabled>⏭</button>
      <button class="btn danger btn-stop" disabled>⏹</button>
    </div>
  </section>

  <aside id="sidePanel">
    <div class="card settings-card">
      <label>Ich bin:
        <select id="gender">
          <option>Mann</option>
          <option>Frau</option>
        </select>
      </label>

      <label>Ich suche:
        <select id="search">
          <option>Mann</option>
          <option>Frau</option>
        </select>
      </label>

      <label>Mein Land:
        <select id="country">
          <option>Deutschland</option>
          <option>Österreich</option>
          <option>Schweiz</option>
        </select>
      </label>

      <div id="profileInfo">
        👥 Online: <span id="onlineCount">0</span>
      </div>
    </div>

    <div class="card" id="chat">
      <div class="messages chat-messages"></div>
      <div class="input-row chat-input">
        <input id="msgInput" type="text" placeholder="Nachricht schreiben..." disabled>
        <button class="btn primary btn-send" disabled>➡</button>
      </div>
    </div>
  </aside>

</main>

<div id="mobileOverlay"></div>

<script src="client.js"></script>

<script>
(function () {
  const body = document.body;
  const chatToggle = document.getElementById("chatToggle");
  const filterToggle = document.getElementById("filterToggle");
  const chatBadge = document.getElementById("chatBadge");
  const chatMessages = document.querySelector(".chat-messages");
  const overlay = document.getElementById("mobileOverlay");

  let unread = 0;

  function isMobile() {
    return window.innerWidth <= 800;
  }

  function closePanels() {
    body.classList.remove("chat-open");
    body.classList.remove("filter-open");
  }

  function updateBadge() {
    if (unread > 0) {
      chatBadge.textContent = unread > 99 ? "99+" : unread;
      chatBadge.classList.add("show");
    } else {
      chatBadge.classList.remove("show");
    }
  }

  chatToggle.addEventListener("click", () => {
    if (!isMobile()) return;
    const open = !body.classList.contains("chat-open");
    closePanels();
    if (open) {
      body.classList.add("chat-open");
      unread = 0;
      updateBadge();
    }
  });

  filterToggle.addEventListener("click", () => {
    if (!isMobile()) return;
    const open = !body.classList.contains("filter-open");
    closePanels();
    if (open) {
      body.classList.add("filter-open");
    }
  });

  overlay.addEventListener("click", closePanels);

  if (chatMessages) {
    const observer = new MutationObserver((mutations) => {
      if (!isMobile()) return;
      if (body.classList.contains("chat-open")) return;

      let added = 0;

      for (const mutation of mutations) {
        mutation.addedNodes.forEach((node) => {
          if (node.nodeType === 1) {
            const text = (node.textContent || "").trim();
            if (text && !text.startsWith("Ich:")) {
              added++;
            }
          }
        });
      }

      if (added > 0) {
        unread += added;
        updateBadge();
      }
    });

    observer.observe(chatMessages, { childList: true });
  }

  window.addEventListener("resize", () => {
    if (!isMobile()) {
      closePanels();
    }
  });
})();
</script>

</body>
</html>
